name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release tag to create or update when manually dispatching the workflow"
        required: false
        default: "v0.1.0-prerelease"

env:
  PLUGIN_NAME: SocietalReputation
  SOLUTION_NAME: SocietalReputation
  RELEASE_DIR: SocietalReputation\bin\Release
  DIST_DIR: dist
  DALAMUD_API_LEVEL: "15"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud SDK bundle
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "dalamud-latest.zip"
          $extractRoot = Join-Path $env:APPDATA "XIVLauncher\addon\Hooks\dev"
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/api${{ env.DALAMUD_API_LEVEL }}/latest.zip" -OutFile $archive
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null
          Expand-Archive -Force $archive $extractRoot

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_NAME }}.sln

      - name: Build
        run: dotnet build ${{ env.SOLUTION_NAME }}.sln --configuration Release --no-restore

      - name: Package plugin artifact
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.RELEASE_DIR }}"
          $distDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.DIST_DIR }}"
          $dllPath = Join-Path $releaseDir "${{ env.PLUGIN_NAME }}.dll"
          $jsonPath = Join-Path $releaseDir "${{ env.PLUGIN_NAME }}.json"
          $zipPath = Join-Path $distDir "${{ env.PLUGIN_NAME }}.zip"

          if (!(Test-Path $dllPath)) { throw "Missing build output: $dllPath" }
          if (!(Test-Path $jsonPath)) { throw "Missing build output: $jsonPath" }

          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          Copy-Item $jsonPath $distDir -Force

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -LiteralPath $dllPath, $jsonPath -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-artifact
          path: |
            ${{ env.DIST_DIR }}/${{ env.PLUGIN_NAME }}.zip
            ${{ env.DIST_DIR }}/${{ env.PLUGIN_NAME }}.json
          if-no-files-found: error

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-artifact
          path: artifact

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            version="${{ github.event.inputs.release_version }}"
          else
            version="v0.1.0-prerelease"
          fi

          if [[ "$version" == *-* ]]; then
            prerelease="true"
          else
            prerelease="false"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.version }}
          name: Release ${{ steps.release_meta.outputs.version }}
          draft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          files: |
            artifact/${{ env.PLUGIN_NAME }}.zip
            artifact/${{ env.PLUGIN_NAME }}.json
1