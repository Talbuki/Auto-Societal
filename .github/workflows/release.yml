name: Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SocietalReputation.sln

      - name: Build Release
        run: dotnet build SocietalReputation.sln --configuration Release --no-restore

      - name: Verify packaged artifact
        shell: pwsh
        run: |
          $artifact = "SocietalReputation/bin/Release/SocietalReputation/latest.zip"
          if (-not (Test-Path $artifact)) {
            throw "Expected packaged artifact not found at $artifact"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: SocietalReputation/bin/Release/SocietalReputation/latest.zip
          generate_release_notes: true
