name: Release Plugin

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SocietalReputation.sln

      - name: Build Release
        run: dotnet build SocietalReputation.sln --configuration Release --no-restore

      - name: Validate packaged artifact and manifest metadata
        shell: pwsh
        run: |
          ./scripts/Validate-PluginRelease.ps1

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest
          target_commitish: main
          files: SocietalReputation/bin/Release/SocietalReputation/latest.zip
          generate_release_notes: true
          make_latest: true
          prerelease: false
          overwrite_files: true

      - name: Verify published download URL
        shell: pwsh
        run: |
          $pluginEntry = (Get-Content pluginmaster.json | ConvertFrom-Json)[0]
          $downloadUrl = $pluginEntry.DownloadLinkInstall

          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              $response = Invoke-WebRequest -Uri $downloadUrl -Method Head
              if ($response.StatusCode -eq 200) {
                Write-Host "Verified published download URL: $downloadUrl"
                exit 0
              }
            }
            catch {
              Write-Host "Attempt $attempt failed for $downloadUrl"
              if ($attempt -eq 6) {
                throw
              }
            }

            Start-Sleep -Seconds 10
          }
