name: Release Plugin

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: release-plugin-latest
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Provision Dalamud libraries
        shell: pwsh
        run: |
          $dalamudZip = Join-Path $env:RUNNER_TEMP "dalamud-latest.zip"
          $dalamudDir = Join-Path $env:RUNNER_TEMP "dalamud"

          Invoke-WebRequest -Uri "https://github.com/goatcorp/dalamud-distrib/raw/main/latest.zip" -OutFile $dalamudZip

          if (Test-Path -LiteralPath $dalamudDir) {
            Remove-Item -LiteralPath $dalamudDir -Recurse -Force
          }

          Expand-Archive -LiteralPath $dalamudZip -DestinationPath $dalamudDir -Force
          "DALAMUD_HOME=$dalamudDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: >
          dotnet restore SocietalReputation.sln
          --source https://api.nuget.org/v3/index.json
          --source https://goatcorp.github.io/dalamud-distrib/nuget/index.json

      - name: Build Release
        run: dotnet build SocietalReputation.sln --configuration Release --no-restore

      - name: Validate packaged artifact and manifest metadata
        shell: pwsh
        run: |
          ./scripts/Validate-PluginRelease.ps1

      - name: Confirm release artifact is ready to publish
        shell: pwsh
        run: |
          $artifactPath = "SocietalReputation/bin/Release/SocietalReputation/latest.zip"

          if (-not (Test-Path -LiteralPath $artifactPath)) {
            throw "Release artifact was not found at '$artifactPath'."
          }

          $artifact = Get-Item -LiteralPath $artifactPath
          if ($artifact.Length -le 0) {
            throw "Release artifact '$artifactPath' is empty."
          }

          Write-Host "Artifact ready for release: $($artifact.FullName) ($($artifact.Length) bytes)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest
          target_commitish: main
          files: SocietalReputation/bin/Release/SocietalReputation/latest.zip
          generate_release_notes: true
          make_latest: true
          prerelease: false
          overwrite_files: true

      - name: Verify published release asset
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $pluginEntry = (Get-Content pluginmaster.json | ConvertFrom-Json)[0]
          $downloadUrl = $pluginEntry.DownloadLinkInstall.Trim()
          $expectedAssetName = "latest.zip"
          $repo = "${{ github.repository }}"

          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              $headers = @{
                Authorization = "Bearer $env:GITHUB_TOKEN"
                "User-Agent" = "SocietalReputation-Release-Validation"
                Accept = "application/vnd.github+json"
              }

              $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/latest" -Headers $headers
              if ($null -eq $release) {
                throw "GitHub did not return a release for the 'latest' tag."
              }

              $assets = @($release.assets)
              if ($assets.Count -eq 0) {
                throw "GitHub release '$($release.name)' does not contain any assets yet."
              }

              $latestAsset = $assets | Where-Object { $_.name -eq $expectedAssetName } | Select-Object -First 1
              if ($null -eq $latestAsset) {
                $assetNames = ($assets | ForEach-Object { $_.name }) -join ", "
                throw "GitHub release '$($release.name)' is missing asset '$expectedAssetName'. Found: $assetNames"
              }

              $response = Invoke-WebRequest -Uri $downloadUrl -Method Head -MaximumRedirection 5
              if ($response.StatusCode -ne 200) {
                throw "Expected status 200 for '$downloadUrl' but received $($response.StatusCode)."
              }

              Write-Host "Verified published GitHub release asset '$expectedAssetName'."
              Write-Host "Verified published download URL: $downloadUrl"
              exit 0
            }
            catch {
              Write-Host "Attempt $attempt failed: $($_.Exception.Message)"
              if ($attempt -eq 6) {
                throw
              }

              Start-Sleep -Seconds 10
            }
          }
